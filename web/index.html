<!DOCTYPE html>
<html lang="sw">

<head>
    <!-- Base Configuration -->
    <base href="/">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>Lishe AI - Msaidizi Wako wa Lishe Tanzania</title>
    <meta name="title" content="Lishe AI - Msaidizi Wako wa Lishe Tanzania">
    <meta name="description"
        content="Programu ya Lishe AI inayotumia Akili Bandia kutoa ushauri wa lishe bora, mapendekezo ya milo, na ufuatiliaji wa afya kwa Watanzania.">
    <meta name="keywords" content="Lishe, Tanzania, Nutrition, AI, Health, Afya, Chakula, Lishe Bora">
    <meta name="author" content="Lishe App Team">
    <meta name="theme-color" content="#2E7D32">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lishe.app/">
    <meta property="og:title" content="Lishe AI - Msaidizi Wako wa Lishe Tanzania">
    <meta property="og:description"
        content="Programu ya Lishe AI inayotumia Akili Bandia kutoa ushauri wa lishe bora na ufuatiliaji wa afya.">
    <meta property="og:image" content="https://lishe.app/icons/Icon-512.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://lishe.app/">
    <meta property="twitter:title" content="Lishe AI - Msaidizi Wako wa Lishe Tanzania">
    <meta property="twitter:description"
        content="Programu ya Lishe AI inayotumia Akili Bandia kutoa ushauri wa lishe bora.">
    <meta property="twitter:image" content="https://lishe.app/icons/Icon-512.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lishe AI">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Flutter Web SDK -->
    <script
        src="https://www.gstatic.com/flutter-canvaskit/ae068c257d2e5b6b3bde58c1da4d17a87f58c7b1/chromium/canvaskit.js"></script>

    <style>
        /* Loading Screen Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #4CAF50 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading {
            text-align: center;
            color: white;
            max-width: 400px;
            padding: 20px;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .app-logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .app-logo svg {
            width: 80px;
            height: 80px;
        }

        .app-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            opacity: 0.8;
        }

        .offline-message {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .offline-message.show {
            display: block;
        }

        /* Hide loading when Flutter renders */
        .flutter-ready #loading {
            display: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>

    <!-- Flutter Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('flutter_service_worker.js?v=1')
                    .then(function (registration) {
                        console.log('ServiceWorker registration successful');

                        // Check for updates
                        registration.addEventListener('updatefound', function () {
                            console.log('New service worker found');
                        });
                    })
                    .catch(function (err) {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // Detect offline status
        window.addEventListener('load', function () {
            function updateOnlineStatus() {
                if (!navigator.onLine) {
                    document.querySelector('.offline-message')?.classList.add('show');
                } else {
                    document.querySelector('.offline-message')?.classList.remove('show');
                }
            }

            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        });

        // Mark Flutter as ready
        window.addEventListener('flutter-first-frame', function () {
            document.body.classList.add('flutter-ready');
        });
    </script>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="logo-container">
            <div class="app-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#2E7D32" stroke="#2E7D32" stroke-width="1.5"
                        stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <div class="app-title">Lishe AI</div>
            <div class="app-subtitle">Msaidizi Wako wa Lishe</div>
        </div>

        <div class="loading-spinner"></div>
        <div class="loading-text">Inapakia programu...</div>

        <div class="offline-message">
            <strong>📡 Huna muunganisho wa intaneti</strong><br>
            Programu itaendelea kufanya kazi lakini data mpya haitapatikana.
        </div>
    </div>

    <!-- Flutter Bootstrap -->
    <script>
        window.addEventListener('load', function (ev) {
            // Download main.dart.js
            _flutter.loader.load({
                serviceWorkerSettings: {
                    serviceWorkerVersion: '1',
                },
                onEntrypointLoaded: function (engineInitializer) {
                    engineInitializer.initializeEngine().then(function (appRunner) {
                        appRunner.runApp();
                    });
                }
            });
        });
    </script>

    <!-- Fallback for older browsers -->
    <noscript>
        <div style="text-align: center; padding: 50px; color: white;">
            <h2>JavaScript Inahitajika</h2>
            <p>Tafadhali wezesha JavaScript kutumia programu hii.</p>
        </div>
    </noscript>
</body>

</html>
